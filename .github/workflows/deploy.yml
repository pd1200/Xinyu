name: 部署靜態網站至 GitHub Pages

# 觸發條件：當程式碼推送至 main 分支時
on:
  push:
    branches: ["main"]

  # 允許在 GitHub 頁面上手動觸發部署
  workflow_dispatch:

# 設定 GitHub Actions 的權限，允許寫入 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 確保同時只有一個部署任務在執行，避免衝突
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. 檢出程式碼
      - name: 檢出專案程式碼
        uses: actions/checkout@v4
      
      # 2. 設定 Node.js 環境
      - name: 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          
      # 3. 安裝專案依賴
      - name: 安裝專案依賴
        run: npm install
        
      # 4. 執行生產環境打包
      - name: 執行打包編譯
        run: npm run build
        
      # 5. 設定 GitHub Pages 串接
      - name: 設定 Pages 服務
        uses: actions/configure-pages@v4
        
      # 6. 上傳打包後的 dist 靜態資料夾
      - name: 上傳打包產物 (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      # 7. 部署至 GitHub Pages
      - name: 部署至 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
